<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>台灣歌劇魅影社團 - 魅影之巢</title>
    <style>
        body {
            background-color: #050505;
            color: #f0f0f0;
            font-family: 'Playfair Display', 'Georgia', serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            background-image: radial-gradient(circle at center, #1c0000 0%, #050505 100%);
        }
        .card {
            background: rgba(0, 0, 0, 0.8);
            padding: 50px 30px;
            border-radius: 10px;
            border: 1px solid #d4af37;
            box-shadow: 0 0 30px rgba(139, 0, 0, 0.3);
            text-align: center;
            max-width: 400px;
            width: 85%;
        }
        .mask-icon { font-size: 60px; margin-bottom: 10px; filter: drop-shadow(0 0 10px #fff); }
        h1 { color: #d4af37; letter-spacing: 4px; font-size: 1.6rem; margin: 10px 0; }
        .subtitle { font-style: italic; color: #888; margin-bottom: 30px; font-size: 0.9rem; }
        
        .btn {
            display: block;
            padding: 15px;
            margin: 15px 0;
            text-decoration: none;
            color: #fff;
            background: linear-gradient(45deg, #4d0000, #8b0000);
            border: 1px solid #d4af37;
            border-radius: 4px;
            font-weight: bold;
            letter-spacing: 2px;
            transition: 0.4s;
            position: relative;
            overflow: hidden;
        }
        .btn:hover {
            transform: scale(1.05);
            background: linear-gradient(45deg, #8b0000, #ff0000);
            box-shadow: 0 0 20px rgba(212, 175, 55, 0.5);
        }
        .line-btn { background: linear-gradient(45deg, #004d00, #008000); border-color: #90ee90; }
        .line-btn:hover { background: linear-gradient(45deg, #008000, #00ff00); box-shadow: 0 0 20px rgba(144, 238, 144, 0.5); }
        
        .footer-rose { font-size: 30px; margin-top: 30px; opacity: 0.8; }
    </style>
</head>
<body>
    <div class="card">
        <div class="mask-icon">🎭</div>
        <h1>台灣歌劇魅影Phans社團</h1>
        <div class="subtitle">"The Phantom Of the Opera Taiwan phans club"</div>
        
        <a href="https://www.facebook.com/groups/twphansclub" target="_blank" class="btn">Facebook 臉書社團</a>
        <a href="https://line.me/ti/g2/ZsFQ6p7QQM5nHDb8Gg0lwVl8RXjnZX-pbVj0Tw" target="_blank" class="btn line-btn">Line 官方討論群</a>
        <a href="https://www.instagram.com/mrs.phantomrox/" target="_blank" class="btn">魅影太太 Instagram</a>
        
        <div class="footer-rose">🌹</div>
    </div>
</body>
</html>
